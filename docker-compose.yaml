version: "3.9"

services:
  db:
    image: postgres:14.12
    container_name: tunez_postgres
    restart: no
    environment:
      POSTGRES_DB: tunez_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tunez_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: